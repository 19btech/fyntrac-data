version: '3.8'  # Explicit version for compatibility (healthchecks, resources, networks)

services:
  dataloader:
    image: ghcr.io/19btech/fyntrac/docker/dataloader:0.0.3-SNAPSHOT
    container_name: fyntrac-dataloader
    working_dir: /dataloader
    ports:
      - "8081:8081"
    entrypoint: ["java", "-cp", "/app/resources:/app/classes:/app/libs/*", "com.reserv.dataloader.DataloaderApplication"]
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_PULSAR_CLIENT_SERVICE-URL: pulsar://pulsar:6650
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      # Use the sync'd password and host
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGODB_PSWD:-R3s3rv#313}@mongodb:27017/master?authSource=admin
    extra_hosts:
      - "localhost:host-gateway" # Force localhost hits to find the mongodb container
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    cpus: '1'
    mem_limit: 1G
    restart: unless-stopped
    networks:
      - fyntrac-network

  model:
    image: ghcr.io/19btech/fyntrac/docker/model:0.0.3-SNAPSHOT
    container_name: fyntrac-model
    working_dir: /model
    ports:
      - "8082:8082"
    entrypoint: ["java", "-cp", "/app/resources:/app/classes:/app/libs/*", "com.fyntrac.model.ModelApplication"]
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_PULSAR_CLIENT_SERVICE-URL: pulsar://pulsar:6650
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGODB_PSWD:-R3s3rv#313}@mongodb:27017/master?authSource=admin
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      dataloader:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fyntrac-network

  dsl-model:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-dsl-model:0.0.3-SNAPSHOT
    container_name: fyntrac-dsl-model
    ports:
      - "8090:8090"
    environment:
      MONGODB_HOST: ${DSL_MODEL_MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-root}
      MONGODB_PASSWORD: ${MONGODB_PSWD:-R3s3rv#313}
      MONGODB_AUTH_DATABASE: ${MONGODB_AUTH_DATABASE:-admin}
      MONGODB_DEFAULT_DATABASE: ${MONGODB_DEFAULT_DATABASE:-master}
      PULSAR_SERVICE_URL: ${PULSAR_SERVICE_URL:-pulsar://pulsar:6650}
      MEMCACHED_HOST: ${MEMCACHED_HOST:-memcached}
      MEMCACHED_PORT: ${MEMCACHED_PORT:-11211}
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3030}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fyntrac-network

  gl:
    image: ghcr.io/19btech/fyntrac/docker/gl:0.0.3-SNAPSHOT
    container_name: fyntrac-gl
    working_dir: /gl
    ports:
      - "8083:8083"
    entrypoint: ["java", "-cp", "/app/resources:/app/classes:/app/libs/*", "com.fyntrac.gl.GlApplication"]
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_PULSAR_CLIENT_SERVICE-URL: pulsar://pulsar:6650
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGODB_PSWD:-R3s3rv#313}@mongodb:27017/master?authSource=admin
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      model:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fyntrac-network
  reporting:
    image: ghcr.io/19btech/fyntrac/docker/reporting:0.0.3-SNAPSHOT
    container_name: fyntrac-reporting
    working_dir: /reporting
    ports:
      - "8084:8084"
    entrypoint: ["java", "-cp", "/app/resources:/app/classes:/app/libs/*", "com.fyntrac.reporting.ReportingApplication"]
    environment:
      SPRING_PROFILES_ACTIVE: test
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      # Add Pulsar if needed: SPRING_PULSAR_CLIENT_SERVICE-URL: pulsar://pulsar:6650
      # Add DB/MongoDB if needed: SPRING_DATA_MONGODB_URI=mongodb://root:R3s3rv%23313@mongodb:27017/master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]  # Assumes Spring Actuator
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      gl:
        condition: service_healthy  # Waits for gl to be healthy
    restart: unless-stopped
    networks:
      - fyntrac-network

  gateway:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-gateway:${GATEWAY_VERSION:-0.0.3-SNAPSHOT}
    container_name: fyntrac-gateway
    ports:
      - "8585:8585"
    environment:
      SPRING_PROFILES_ACTIVE: test
      DATALOADER_SERVICE_URI: http://dataloader:8081
      REPORTING_SERVICE_URI: http://reporting:8084
      DSL_SERVICE_URI: http://dsl:8000
      INSIGHT_SERVICE_URI: http://insight:4000
      CORS_ALLOWED_ORIGINS: http://${BASE_URI}:3030,http://web:3030,${DSL_STUDIO_URI:-http://localhost:3000},http://dsl-ui,http://${BASE_URI}:3001,http://insight-ui
      FRONTEND_BASE_URL: http://${BASE_URI}:3030
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_CLIENT_SECRET: ${ZITADEL_CLIENT_SECRET}
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8585/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      dataloader:
        condition: service_healthy
      reporting:
        condition: service_healthy
    cpus: '0.5'
    mem_limit: 512M
    restart: unless-stopped
    networks:
      - fyntrac-network

  web:
    image: ghcr.io/19btech/fyntrac/docker/web:0.0.3-SNAPSHOT
    container_name: fyntrac-web
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      NEXT_PUBLIC_GATEWAY_URI: http://gateway:8585
      NEXT_PUBLIC_TENANT: Test
      NEXT_PUBLIC_DSL_STUDIO_URL: http://${BASE_URI}:3000
      NEXT_PUBLIC_INSIGHT_URL: http://${BASE_URI}:3001
    depends_on:
      gateway:
        condition: service_healthy  # Waits for gateway to be healthy
    restart: unless-stopped
    networks:
      - fyntrac-network

  dsl:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-dsl:0.0.3-SNAPSHOT
    container_name: fyntrac-dsl
    ports:
      - "8000:8000"
    environment:
      # Connect to host's MongoDB via host.docker.internal or fyntrac network
      - MONGO_URL=mongodb://root:${MONGODB_PSWD:-R3s3rv#313}@mongodb:${MONGODB_PORT:-27017}/${MONGODB_NAME:-master}?authSource=admin
      - DB_NAME=${MONGODB_NAME:-master}
      - HOST=0.0.0.0
      - PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ZITADEL_ISSUER_URI=${ZITADEL_ISSUER_URI:-}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:-}
      - DATALOADER_BASE_URI=http://gateway:8585/api/dataloader
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fyntrac-network

  dsl-ui:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-dsl-ui:0.0.3-SNAPSHOT
    container_name: fyntrac-dsl-ui
    ports:
      - "3000:80"
    environment:
      - GATEWAY_URI=http://gateway:8585
    depends_on:
      dsl:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fyntrac-network

  insight:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-insight:0.0.3-SNAPSHOT
    container_name: fyntrac-insight
    ports:
      - "4000:4000"
    environment:
      # Metadata DB — <TENANT> replaced per-request with the tenant key (e.g. TNT001_INSIGHT)
      - MONGODB_URI=mongodb://root:${MONGODB_PSWD:-R3s3rv%23313}@mongodb:${MONGODB_PORT:-27017}/<TENANT>_INSIGHT?authSource=admin
      # Target financial data DB — <TENANT> replaced per-request (e.g. TNT001)
      - TARGET_MONGODB_URI=mongodb://root:${MONGODB_PSWD:-R3s3rv%23313}@mongodb:${MONGODB_PORT:-27017}/<TENANT>?authSource=admin
      # Tenant isolation: 'database' = each tenant has its own DB; no tenantId field filter needed
      - TENANT_ISOLATION=database
      - ZITADEL_ISSUER_URI=${ZITADEL_ISSUER_URI:-}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:-}
      # CORS: wildcard allows browser access regardless of VM IP/hostname
      - CORS_ORIGIN=*
      - PORT=4000
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fyntrac-network

  insight-ui:
    image: ghcr.io/19btech/fyntrac/docker/fyntrac-insight-ui:0.0.3-SNAPSHOT
    container_name: fyntrac-insight-ui
    ports:
      - "3001:80"
    environment:
      # Direct to insight backend — bypasses gateway OAuth session requirement
      # Insight backend does its own ZITADEL JWT validation
      - BACKEND_URI=http://insight:4000
    depends_on:
      insight:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fyntrac-network


networks:
  fyntrac-network:
    driver: bridge
    external: true  # Connects to existing manually created network (Pulsar/MongoDB/etc.)

# No volumes needed here (add if apps require persistent data, e.g., - app-logs:/app/logs)
